name: creatoo
description: "A new Flutter project."
publish_to: 'none'

version: 1.2.1+56
# ios version update command: flutter build ios --no-codesign


environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  cupertino_icons: ^1.0.6
  fluttertoast: ^8.2.12
  http: ^1.3.0
  another_flushbar: ^1.12.30
  provider: ^6.0.5
  shared_preferences: ^2.5.2
  dartz: ^0.10.1
  pinput: ^5.0.0
  smart_auth: ^2.0.0
  dropdown_search: ^5.0.6
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^18.0.1
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.8.0
  razorpay_flutter: ^1.4.0
  flutter_dotenv: ^5.1.0
  intl: ^0.20.2
  get: ^4.6.6
  mobile_scanner: ^6.0.2
  dio: ^5.0.0
  flutter_svg:
  google_fonts:
  flutter_native_splash:
  lottie:
  url_launcher: ^6.3.0
  jwt_decoder: ^2.0.1
  device_preview: ^1.2.0
  permission_handler:
  device_info_plus: ^11.5.0
  path_provider: ^2.1.5
  image_gallery_saver_plus: ^4.0.1
  dotted_border: ^2.1.0
  video_player: ^2.8.1
  shimmer: ^2.0.0
  photo_view: ^0.15.0
  crypto: ^3.0.6
  confetti: ^0.7.0
  upgrader: ^11.4.0
  animated_button: ^0.2.0
  app_links: ^6.3.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/icons/
    - assets/fonts/
    - assets/fonts/SFUIText/
    - assets/images/
    - assets/lottie/
    - assets/gifs/

  fonts:
    - family: SFUIText
      fonts:
       - asset: assets/fonts/SFUIText/SFUIText-Regular.otf
       - asset: assets/fonts/SFUIText/SFUIText-RegularG1.otf
         weight: 400
       - asset: assets/fonts/SFUIText/SFUIText-RegularG2.otf
         weight: 400
       - asset: assets/fonts/SFUIText/SFUIText-RegularG3.otf
         weight: 400
       - asset: assets/fonts/SFUIText/SFUIText-Light.otf
         weight: 300
       - asset: assets/fonts/SFUIText/SFUIText-LightItalic.otf
         weight: 300
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-Medium.otf
         weight: 500
       - asset: assets/fonts/SFUIText/SFUIText-MediumItalic.otf
         weight: 500
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-Semibold.otf
         weight: 600
       - asset: assets/fonts/SFUIText/SFUIText-Bold.otf
         weight: 700
       - asset: assets/fonts/SFUIText/SFUIText-BoldItalicG1.otf
         weight: 700
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-BoldItalicG2.otf
         weight: 700
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-BoldItalicG3.otf
         weight: 700
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-Heavy.otf
         weight: 800
       - asset: assets/fonts/SFUIText/SFUIText-HeavyItalic.otf
         weight: 800
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-Italic.otf
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-ItalicG1.otf
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-ItalicG2.otf
         style: italic
       - asset: assets/fonts/SFUIText/SFUIText-ItalicG3.otf
         style: italic
